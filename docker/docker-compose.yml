services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - localclip_data:/home/user/.localclip
    environment:
      - LOCALCLIP_STORAGE__BASE_PATH=/home/user/.localclip
      - LOCALCLIP_GPU__BACKEND=cpu
    restart: unless-stopped

volumes:
  localclip_data:
